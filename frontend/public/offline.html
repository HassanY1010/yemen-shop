<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل بالإنترنت - منصة سوق اليمن</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4F46E5">
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .icon-box {
      width: 80px;
      height: 80px;
      background: rgba(79, 70, 229, 0.15);
      color: #818cf8;
      border-radius: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.25rem;
      margin: 0 auto 1.5rem auto;
      border: 1px solid rgba(129, 140, 248, 0.2);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
      color: #ffffff;
    }
    p {
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: #4f46e5;
      color: #ffffff;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.85rem 1.75rem;
      border-radius: 0.85rem;
      border: none;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s, transform 0.1s;
      text-decoration: none;
    }
    .btn:hover { background: #4338ca; }
    .btn:active { transform: scale(0.98); }
    .badge {
      display: inline-block;
      background: #334155;
      color: #cbd5e1;
      font-size: 0.75rem;
      padding: 0.35rem 0.85rem;
      border-radius: 9999px;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-box">
      <i class="fas fa-wifi-slash"></i>
    </div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>يبدو أن انقطاعاً حدث في الاتصال بالشبكة. يرجى التأكد من اتصالك بالإنترنت ثم النقر على زر إعادة المحاولة.</p>
    <button class="btn" onclick="window.location.reload()">
      <i class="fas fa-sync-alt"></i> إعادة المحاولة الآن
    </button>
    <div class="badge">
      <i class="fas fa-shield-alt"></i> منصة سوق اليمن - وضع العمل بدون اتصال
    </div>
  </div>
</body>
</html>
